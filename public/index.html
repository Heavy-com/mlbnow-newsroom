<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heavy on Sports — Newsroom Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#080a0f; --surface:#0f1318; --surface2:#161b22; --surface3:#1e242d;
    --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.12);
    --text:#e8edf2; --text2:#8a9ab0; --text3:#4a5568;
    --red:#c0392b; --red-dim:rgba(192,57,43,0.12);
    --blue-bright:#3b82f6; --blue-dim:rgba(59,130,246,0.15); --blue:#1a56a0;
    --gold:#d4a017; --gold-dim:rgba(212,160,23,0.12);
    --green-bright:#22c55e; --green-dim:rgba(34,197,94,0.12); --green:#1a6e3c;
    --x-color:#e7e9ea; --x-dim:rgba(231,233,234,0.08);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;line-height:1.5;min-height:100vh;}

  /* HEADER */
  .header{border-bottom:1px solid var(--border);padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;height:54px;position:sticky;top:0;background:rgba(8,10,15,0.96);backdrop-filter:blur(12px);z-index:100;}
  .header-left{display:flex;align-items:center;gap:16px;}
  .wordmark{font-family:'Playfair Display',serif;font-size:17px;font-weight:900;letter-spacing:-0.02em;}
  .live-badge{display:flex;align-items:center;gap:5px;background:var(--red-dim);border:1px solid rgba(192,57,43,0.3);border-radius:4px;padding:3px 8px;font-family:'DM Mono',monospace;font-size:10px;color:var(--red);letter-spacing:0.08em;}
  .live-dot{width:6px;height:6px;border-radius:50%;background:var(--red);animation:blink 1.2s infinite;}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}
  .header-right{display:flex;align-items:center;gap:12px;}
  .clock{font-family:'DM Mono',monospace;font-size:11px;color:var(--text3);}
  .refresh-btn{background:var(--surface2);border:1px solid var(--border2);color:var(--text2);padding:5px 12px;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all 0.15s;}
  .refresh-btn:hover{background:var(--surface3);color:var(--text);}
  .refresh-btn.spinning svg{animation:spin 0.8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}

  /* LEAGUE TABS */
  .league-tabs{display:flex;align-items:center;gap:2px;padding:0 1.5rem;border-bottom:1px solid var(--border);background:rgba(8,10,15,0.96);position:sticky;top:54px;z-index:99;}
  .league-tab{padding:10px 20px;border:none;background:none;color:var(--text2);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;transition:all 0.15s;display:flex;align-items:center;gap:7px;}
  .league-tab:hover{color:var(--text);}
  .league-tab.active{color:var(--text);border-bottom-color:var(--league-color,var(--blue-bright));}
  .league-badge{font-family:'DM Mono',monospace;font-size:9px;padding:2px 6px;border-radius:3px;background:var(--surface2);}

  /* TICKER */
  .ticker{border-bottom:1px solid rgba(59,130,246,0.2);padding:6px 0;overflow:hidden;display:flex;align-items:center;}
  .ticker-label{font-family:'DM Mono',monospace;font-size:10px;font-weight:500;letter-spacing:0.1em;color:var(--blue-bright);padding:0 14px;white-space:nowrap;border-right:1px solid rgba(59,130,246,0.3);margin-right:14px;flex-shrink:0;}
  .ticker-track{display:flex;gap:48px;animation:scroll 55s linear infinite;white-space:nowrap;}
  .ticker-track:hover{animation-play-state:paused;}
  @keyframes scroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}
  .ticker-item{font-size:12px;color:rgba(232,237,242,0.85);font-weight:500;}
  .ticker-sep{color:rgba(59,130,246,0.4);margin:0 6px;}

  /* LAYOUT */
  .main{display:grid;grid-template-columns:250px 1fr;min-height:calc(100vh - 110px);}

  /* SIDEBAR */
  .sidebar{border-right:1px solid var(--border);padding:1rem 0;position:sticky;top:110px;height:calc(100vh - 110px);overflow-y:auto;scrollbar-width:thin;}
  .search-wrap{padding:0 0.75rem;margin-bottom:0.5rem;}
  .sidebar-search{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:12px;padding:6px 10px;outline:none;}
  .sidebar-search::placeholder{color:var(--text3);}
  .filter-btn{width:100%;display:flex;align-items:center;justify-content:space-between;padding:6px 1rem;background:none;border:none;color:var(--text2);font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;text-align:left;transition:all 0.12s;border-left:2px solid transparent;}
  .filter-btn:hover{color:var(--text);background:var(--surface2);}
  .filter-btn.active{color:var(--text);border-left-color:var(--blue-bright);background:var(--blue-dim);}
  .filter-count{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);flex-shrink:0;margin-left:6px;}
  .filter-btn.active .filter-count{color:var(--blue-bright);}
  .cat-group-label{font-family:'DM Mono',monospace;font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:0.1em;padding:8px 1rem 4px;margin-top:4px;}
  .team-dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:7px;flex-shrink:0;}

  /* CONTENT */
  .content{padding:1.25rem;}
  .stats-row{display:grid;gap:8px;margin-bottom:1.25rem;}
  .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;}
  .stat-label{font-size:10px;color:var(--text3);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:4px;font-family:'DM Mono',monospace;}
  .stat-value{font-family:'Playfair Display',serif;font-size:24px;font-weight:700;color:var(--text);line-height:1;}
  .stat-sub{font-size:11px;color:var(--text3);margin-top:3px;}

  /* SOURCE TABS */
  .source-tabs{display:flex;gap:6px;margin-bottom:1rem;align-items:center;}
  .source-tab{padding:5px 14px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--text2);font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;gap:6px;}
  .source-tab:hover{background:var(--surface2);color:var(--text);}
  .source-tab.active{background:var(--surface3);color:var(--text);border-color:var(--border2);}
  .source-tab .tab-count{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);}
  .content-toolbar{display:flex;align-items:center;gap:8px;margin-bottom:1rem;}
  .main-search{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;padding:7px 12px;outline:none;}
  .main-search::placeholder{color:var(--text3);}
  .sort-select{background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text2);font-family:'DM Sans',sans-serif;font-size:12px;padding:7px 10px;outline:none;cursor:pointer;}
  .result-count{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;white-space:nowrap;}

  /* CARDS */
  .cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:10px;}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:border-color 0.15s,transform 0.15s;display:flex;flex-direction:column;animation:fadeIn 0.3s ease both;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
  .card:hover{border-color:var(--border2);transform:translateY(-1px);}
  .card.breaking{border-color:rgba(192,57,43,0.4);}
  .card.trade{border-color:rgba(212,160,23,0.35);}
  .card.injury{border-color:rgba(34,197,94,0.3);}
  .card.social{border-color:rgba(231,233,234,0.12);background:#0d1117;}
  .card-img{width:100%;height:150px;object-fit:cover;display:block;background:var(--surface2);}
  .card-body{padding:12px 14px;flex:1;display:flex;flex-direction:column;gap:7px;}
  .card-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
  .source-tag{font-family:'DM Mono',monospace;font-size:10px;font-weight:500;padding:2px 7px;border-radius:4px;}
  .type-tag{font-size:10px;padding:2px 7px;border-radius:4px;font-weight:500;font-family:'DM Mono',monospace;letter-spacing:0.04em;}
  .type-breaking{background:var(--red-dim);color:#e57373;border:1px solid rgba(192,57,43,0.25);}
  .type-trade{background:var(--gold-dim);color:var(--gold);border:1px solid rgba(212,160,23,0.3);}
  .type-injury{background:var(--green-dim);color:var(--green-bright);border:1px solid rgba(34,197,94,0.25);}
  .type-social{background:var(--x-dim);color:var(--x-color);border:1px solid rgba(231,233,234,0.15);font-size:10px;}
  .team-tag{font-size:10px;padding:2px 7px;border-radius:4px;background:var(--surface3);color:var(--text2);}
  .card-time{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);margin-left:auto;}
  .card-title{font-family:'Playfair Display',serif;font-size:15px;font-weight:700;color:var(--text);line-height:1.35;}
  .card-excerpt{font-size:12px;color:var(--text2);line-height:1.6;flex:1;}
  .card-footer{padding:8px 14px 12px;display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--border);}
  .card-author{font-size:11px;color:var(--text3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:130px;}
  .social-header{padding:12px 14px 0;display:flex;align-items:center;gap:10px;}
  .social-avatar{width:36px;height:36px;border-radius:50%;background:var(--surface3);display:flex;align-items:center;justify-content:center;font-weight:600;font-size:14px;color:var(--text2);flex-shrink:0;}
  .social-name{font-size:13px;font-weight:500;color:var(--text);}
  .social-handle{font-size:11px;color:var(--text3);}
  .social-body{padding:10px 14px;flex:1;}
  .social-text{font-size:13px;color:var(--text);line-height:1.6;}
  .social-metrics{display:flex;gap:14px;padding:8px 14px;border-top:1px solid var(--border);}
  .metric{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:4px;}
  .metric span{color:var(--text2);font-weight:500;}
  .social-footer{padding:8px 14px 12px;display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--border);}
  .stream-tags{display:flex;gap:4px;flex-wrap:wrap;}
  .stream-tag{font-size:10px;padding:1px 6px;border-radius:3px;background:var(--blue-dim);color:var(--blue-bright);border:1px solid rgba(59,130,246,0.2);}
  .tx-body{padding:12px 14px;flex:1;display:flex;flex-direction:column;gap:8px;}
  .tx-player{font-family:'Playfair Display',serif;font-size:15px;font-weight:700;color:var(--text);}
  .tx-desc{font-size:12px;color:var(--text2);line-height:1.6;}
  .tx-teams{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text3);}
  .tx-arrow{color:var(--blue-bright);}
  .btn-assign{background:var(--blue);color:#fff;border:none;border-radius:6px;padding:5px 11px;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;cursor:pointer;transition:opacity 0.15s;}
  .btn-assign:hover{opacity:0.85;}
  .btn-assign.assigned{background:var(--green);cursor:default;}
  .btn-read{background:none;border:1px solid var(--border2);color:var(--text2);border-radius:6px;padding:5px 11px;font-family:'DM Sans',sans-serif;font-size:11px;cursor:pointer;transition:all 0.15s;}
  .btn-read:hover{background:var(--surface2);color:var(--text);}
  .state-box{grid-column:1/-1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4rem 2rem;gap:12px;color:var(--text3);font-size:13px;}
  .spinner{width:26px;height:26px;border:2px solid var(--border2);border-top-color:var(--blue-bright);border-radius:50%;animation:spin 0.7s linear infinite;}
  ::-webkit-scrollbar{width:3px;} ::-webkit-scrollbar-track{background:transparent;} ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px;}
</style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <img src="/Heavy-Clear7.png" alt="Heavy" style="height:28px;width:auto;filter:invert(1);opacity:0.92">
    <div class="live-badge"><div class="live-dot"></div>LIVE</div>
  </div>
  <div class="header-right">
    <div class="clock" id="clock"></div>
    <button class="refresh-btn" id="refreshBtn" onclick="fetchAll()">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
      Refresh
    </button>
  </div>
</header>

<!-- LEAGUE TABS -->
<div class="league-tabs">
  <button class="league-tab active" id="ltab-mlb" onclick="setLeague('mlb',this)" style="--league-color:#3b82f6">⚾ MLB <span class="league-badge">30 Teams</span></button>
  <button class="league-tab" id="ltab-nfl" onclick="setLeague('nfl',this)" style="--league-color:#d4a017">🏈 NFL <span class="league-badge">32 Teams</span></button>
  <button class="league-tab" id="ltab-nba" onclick="setLeague('nba',this)" style="--league-color:#e87722">🏀 NBA <span class="league-badge">30 Teams</span></button>
  <button class="league-tab" id="ltab-nhl" onclick="setLeague('nhl',this)" style="--league-color:#00b4d8">🏒 NHL <span class="league-badge">32 Teams</span></button>
</div>

<div class="ticker">
  <div class="ticker-label" id="tickerLabel">MLB WIRE</div>
  <div class="ticker-track" id="tickerTrack"><span class="ticker-item">Loading latest headlines…</span><span class="ticker-item">Loading latest headlines…</span></div>
</div>

<div class="main">
  <aside class="sidebar">
    <div style="margin-bottom:1.5rem">
      <div class="search-wrap"><input class="sidebar-search" type="text" placeholder="Filter teams…" id="catSearch" oninput="renderSidebar()"/></div>
      <button class="filter-btn active" id="btn-all" onclick="setCategory('all',this)">All Stories <span class="filter-count" id="count-all">—</span></button>
      <button class="filter-btn" id="btn-breaking" onclick="setCategory('breaking',this)">🔴 Breaking <span class="filter-count" id="count-breaking">—</span></button>
      <button class="filter-btn" id="btn-trades" onclick="setCategory('trades',this)">🔄 Trades & Roster <span class="filter-count" id="count-trades">—</span></button>
      <button class="filter-btn" id="btn-injuries" onclick="setCategory('injuries',this)">🏥 Injuries <span class="filter-count" id="count-injuries">—</span></button>
    </div>
    <div id="sidebarCats"></div>
  </aside>

  <main class="content">
    <div class="stats-row" id="statsRow" style="grid-template-columns:repeat(5,1fr)">
      <div class="stat-card"><div class="stat-label">Total Stories</div><div class="stat-value" id="stat-total">—</div><div class="stat-sub">this refresh</div></div>
      <div class="stat-card"><div class="stat-label">Breaking</div><div class="stat-value" id="stat-breaking" style="color:var(--red)">—</div><div class="stat-sub">alerts</div></div>
      <div class="stat-card"><div class="stat-label">Trades & Moves</div><div class="stat-value" id="stat-trades" style="color:var(--gold)">—</div><div class="stat-sub">roster news</div></div>
      <div class="stat-card"><div class="stat-label">Injuries</div><div class="stat-value" id="stat-injuries" style="color:var(--green-bright)">—</div><div class="stat-sub">IL & health</div></div>
      <div class="stat-card"><div class="stat-label">Last Updated</div><div class="stat-value" id="stat-updated" style="font-size:17px;padding-top:6px">—</div><div class="stat-sub">&nbsp;</div></div>
    </div>

    <div class="source-tabs" id="sourceTabs">
      <button class="source-tab active" id="tab-all" onclick="setSourceTab('all',this)">All <span class="tab-count" id="tab-count-all">—</span></button>
      <button class="source-tab" id="tab-news" onclick="setSourceTab('news',this)">📰 News <span class="tab-count" id="tab-count-news">—</span></button>
      <button class="source-tab" id="tab-transactions" onclick="setSourceTab('transactions',this)">🔄 Transactions <span class="tab-count" id="tab-count-transactions">—</span></button>
      <button class="source-tab" id="tab-social" onclick="setSourceTab('social',this)">𝕏 X Posts <span class="tab-count" id="tab-count-social">—</span></button>
    </div>

    <div class="content-toolbar">
      <input class="main-search" type="text" placeholder="Search headlines…" id="searchInput" oninput="renderCards()"/>
      <select class="sort-select" id="sortSelect" onchange="renderCards()">
        <option value="newest">Newest first</option>
        <option value="oldest">Oldest first</option>
      </select>
      <span class="result-count" id="resultCount">—</span>
    </div>
    <div class="cards-grid" id="cardsGrid">
      <div class="state-box"><div class="spinner"></div><span>Connecting to sources…</span></div>
    </div>
  </main>
</div>

<script>
// ── LEAGUE DATA ───────────────────────────────────────────────────────────────
const LEAGUES = {
  mlb: {
    label: 'MLB', emoji: '⚾', color: '#3b82f6', tickerLabel: 'MLB WIRE',
    hasTransactions: true, hasSocial: true,
    queries: [
      'MLB trade roster move baseball',
      'MLB injury baseball player',
      'Yankees Dodgers Mets Red Sox Astros Cubs Braves baseball news',
      'Phillies Padres Mariners Orioles Cardinals Rangers Blue Jays baseball news'
    ],
    divisions: ['AL East','AL Central','AL West','NL East','NL Central','NL West'],
    teams: [
      {id:'orioles',   label:'Baltimore Orioles',    division:'AL East',   color:'#DF4601', keywords:['baltimore orioles','orioles']},
      {id:'redsox',    label:'Boston Red Sox',        division:'AL East',   color:'#BD3039', keywords:['boston red sox','red sox','fenway']},
      {id:'yankees',   label:'New York Yankees',      division:'AL East',   color:'#003087', keywords:['new york yankees','yankees','bronx']},
      {id:'rays',      label:'Tampa Bay Rays',        division:'AL East',   color:'#8FBCE6', keywords:['tampa bay rays','rays baseball']},
      {id:'bluejays',  label:'Toronto Blue Jays',     division:'AL East',   color:'#134A8E', keywords:['toronto blue jays','blue jays']},
      {id:'whitesox',  label:'Chicago White Sox',     division:'AL Central',color:'#C4CED4', keywords:['chicago white sox','white sox']},
      {id:'guardians', label:'Cleveland Guardians',   division:'AL Central',color:'#E31937', keywords:['cleveland guardians','guardians']},
      {id:'tigers',    label:'Detroit Tigers',        division:'AL Central',color:'#FA4616', keywords:['detroit tigers','tigers baseball']},
      {id:'royals',    label:'Kansas City Royals',    division:'AL Central',color:'#004687', keywords:['kansas city royals','royals baseball']},
      {id:'twins',     label:'Minnesota Twins',       division:'AL Central',color:'#002B5C', keywords:['minnesota twins','twins baseball']},
      {id:'astros',    label:'Houston Astros',        division:'AL West',   color:'#EB6E1F', keywords:['houston astros','astros baseball']},
      {id:'angels',    label:'Los Angeles Angels',    division:'AL West',   color:'#BA0021', keywords:['los angeles angels','la angels']},
      {id:'athletics', label:'Athletics',             division:'AL West',   color:'#003831', keywords:['athletics baseball','oakland athletics','las vegas athletics']},
      {id:'mariners',  label:'Seattle Mariners',      division:'AL West',   color:'#0C2C56', keywords:['seattle mariners','mariners baseball']},
      {id:'rangers',   label:'Texas Rangers',         division:'AL West',   color:'#003278', keywords:['texas rangers','rangers baseball']},
      {id:'braves',    label:'Atlanta Braves',        division:'NL East',   color:'#CE1141', keywords:['atlanta braves','braves baseball']},
      {id:'marlins',   label:'Miami Marlins',         division:'NL East',   color:'#00A3E0', keywords:['miami marlins','marlins baseball']},
      {id:'mets',      label:'New York Mets',         division:'NL East',   color:'#002D72', keywords:['new york mets','mets baseball']},
      {id:'phillies',  label:'Philadelphia Phillies', division:'NL East',   color:'#E81828', keywords:['philadelphia phillies','phillies']},
      {id:'nationals', label:'Washington Nationals',  division:'NL East',   color:'#AB0003', keywords:['washington nationals','nationals baseball']},
      {id:'cubs',      label:'Chicago Cubs',          division:'NL Central',color:'#0E3386', keywords:['chicago cubs','cubs baseball','wrigley']},
      {id:'reds',      label:'Cincinnati Reds',       division:'NL Central',color:'#C6011F', keywords:['cincinnati reds','reds baseball']},
      {id:'rockies',   label:'Colorado Rockies',      division:'NL Central',color:'#333366', keywords:['colorado rockies','rockies baseball']},
      {id:'brewers',   label:'Milwaukee Brewers',     division:'NL Central',color:'#FFC52F', keywords:['milwaukee brewers','brewers baseball']},
      {id:'cardinals', label:'St. Louis Cardinals',   division:'NL Central',color:'#C41E3A', keywords:['st. louis cardinals','cardinals baseball']},
      {id:'dbacks',    label:'Arizona Diamondbacks',  division:'NL West',   color:'#A71930', keywords:['arizona diamondbacks','d-backs']},
      {id:'dodgers',   label:'Los Angeles Dodgers',   division:'NL West',   color:'#005A9C', keywords:['los angeles dodgers','dodgers','ohtani']},
      {id:'padres',    label:'San Diego Padres',      division:'NL West',   color:'#2F241D', keywords:['san diego padres','padres baseball']},
      {id:'giants',    label:'San Francisco Giants',  division:'NL West',   color:'#FD5A1E', keywords:['san francisco giants','sf giants']},
      {id:'pirates',   label:'Pittsburgh Pirates',    division:'NL Central',color:'#FDB827', keywords:['pittsburgh pirates','pirates baseball']},
    ]
  },
  nfl: {

const TRADE_KW    = ['trade','traded','roster move','dfa','waiver','signed','free agent','contract','extension','released','claimed','optioned','recalled','acquired','deal'];
const INJURY_KW   = ['injury','injured',' il ','injured list','disabled list','surgery','torn','strain','sprain','concussion','day-to-day','out indefinitely','placed on il'];
const BREAKING_KW = ['breaking','exclusive','just in','confirmed','fired','resigns','retires','suspended','announces'];

let activeLeague = 'mlb';
let newsArticles = [];
let socialPosts = [];
let transactions = [];
let activeCategory = 'all';
let activeSourceTab = 'all';

// Cache per league
const leagueCache = { mlb:{}, nfl:{}, nba:{}, nhl:{} };

const txt = a => ((a.title||a.text_preview||'')+' '+(a.description||a.author?.display_name||'')).toLowerCase();
const isTrade = a => TRADE_KW.some(k=>txt(a).includes(k));
const isInjury = a => INJURY_KW.some(k=>txt(a).includes(k));
const isBreaking = a => BREAKING_KW.some(k=>txt(a).includes(k)) || (a.matched_streams||[]).includes('Breaking MLB');
const timeAgo = d => { const s=(Date.now()-new Date(d))/1000; if(s<60)return`${~~s}s ago`; if(s<3600)return`${~~(s/60)}m ago`; if(s<86400)return`${~~(s/3600)}h ago`; return`${~~(s/86400)}d ago`; };
const fmtDateTime = d => {
  const dt = new Date(d);
  if (isNaN(dt)) return '';
  const date = dt.toLocaleDateString('en-US',{month:'short',day:'numeric'});
  const time = dt.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
  return `${date} · ${time}`;
};
const srcColor = n => { const c=['#3b7dd8','#2d9c5f','#d4860f','#9b59b6','#e8412a','#16a085']; let h=0; for(const x of(n||''))h=(h*31+x.charCodeAt(0))%c.length; return c[h]; };
const initials = s => (s||'?').split(/\s+/).map(w=>w[0]).join('').toUpperCase().slice(0,2);

function getLeague() { return LEAGUES[activeLeague]; }
function getTeams() { return getLeague().teams; }

function matchTeams(a) {
  const t = txt(a);
  const streams = [...(a.matched_streams||[]), ...(a.matched_leagues||[])].map(s=>s.toLowerCase());
  // For league-level streams (NFL/NBA/NHL/MLB), match all posts to teams via keywords
  return getTeams().filter(tm =>
    tm.keywords.some(k=>t.includes(k)) ||
    (tm.streams||[]).some(s=>streams.includes(s.toLowerCase()))
  ).map(tm=>tm.id);
}

function matchTeamsTransaction(t) {
  const from = (t.fromTeam||'').toLowerCase();
  const to = (t.toTeam||'').toLowerCase();
  const desc = (t.description||'').toLowerCase();
  return getTeams().filter(tm=>
    tm.keywords.some(k=>from.includes(k)||to.includes(k)||desc.includes(k))
  ).map(tm=>tm.id);
}

async function setLeague(league, el) {
  activeLeague = league;
  activeCategory = 'all';
  activeSourceTab = 'all';
  document.querySelectorAll('.league-tab').forEach(b=>b.classList.remove('active'));
  if(el) el.classList.add('active');
  document.getElementById('tickerLabel').textContent = getLeague().tickerLabel;

  // Update source tabs visibility
  const txTab = document.getElementById('tab-transactions');
  const socialTab = document.getElementById('tab-social');
  txTab.style.display = getLeague().hasTransactions ? '' : 'none';
  socialTab.style.display = getLeague().hasSocial ? '' : 'none';

  // Reset active source tab if hidden
  if (!getLeague().hasTransactions && activeSourceTab === 'transactions') activeSourceTab = 'all';
  if (!getLeague().hasSocial && activeSourceTab === 'social') activeSourceTab = 'all';
  document.querySelectorAll('.source-tab').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-all').classList.add('active');

  await fetchAll();
}

async function fetchAll() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  document.getElementById('cardsGrid').innerHTML = '<div class="state-box"><div class="spinner"></div><span>Connecting to sources…</span></div>';

  const league = getLeague();
  const cached = leagueCache[activeLeague];
  const CACHE_MS = 4 * 60 * 1000; // use cache if fresher than 4 min
  let newsResults, txResult, nocapResult;

  if (cached && cached.ts && (Date.now() - cached.ts) < CACHE_MS) {
    // Use background-refreshed data
    newsResults = cached.newsResults;
    txResult = cached.txResult;
    nocapResult = cached.nocapResult;
  } else {
    // Fetch fresh
    const fetches = [
      Promise.allSettled(league.queries.map(q=>fetch(`/api/news?q=${encodeURIComponent(q)}&pageSize=20`).then(r=>r.json())))
    ];
    if (league.hasTransactions) fetches.push(fetch(TX_ENDPOINTS[activeLeague]).then(r=>r.json()).catch(()=>null));
    if (league.hasSocial) fetches.push(fetch('/api/nocap').then(r=>r.json()).catch(()=>null));
    const results = await Promise.allSettled(fetches);
    newsResults = results[0];
    txResult = league.hasTransactions ? results[1] : null;
    nocapResult = league.hasSocial ? results[league.hasTransactions ? 2 : 1] : null;
    leagueCache[activeLeague] = { newsResults, txResult, nocapResult, ts: Date.now() };
  }

  // Process news
  const seen = new Set(); newsArticles = [];
  if (newsResults.status === 'fulfilled') {
    for (const r of newsResults.value) {
      if (r.status==='fulfilled' && r.value.articles) {
        for (const a of r.value.articles) {
          if (!seen.has(a.url) && a.title && a.title!=='[Removed]') {
            seen.add(a.url);
            a._type='news'; a._teams=matchTeams(a);
            a._trade=isTrade(a); a._injury=isInjury(a); a._breaking=isBreaking(a);
            a._sortDate=new Date(a.publishedAt);
            newsArticles.push(a);
          }
        }
      }
    }
  }

  // Process social posts — filter to current league
  socialPosts = [];
  if (nocapResult?.status==='fulfilled' && nocapResult.value?.items) {
    for (const p of nocapResult.value.items) {
      // Filter to posts matching the active league
      const leagues = [...(p.matched_leagues||[]), ...(p.matched_streams||[])].map(s=>s.toUpperCase());
      if (!leagues.includes(activeLeague.toUpperCase())) continue;
      p._type='social'; p._teams=matchTeams(p);
      p._trade=isTrade(p); p._injury=isInjury(p); p._breaking=isBreaking(p);
      p._sortDate=new Date(p.created_at);
      socialPosts.push(p);
    }
  }

  // Process transactions (MLB + NHL)
  transactions = [];
  if (txResult?.status==='fulfilled' && txResult.value?.transactions) {
    for (const t of txResult.value.transactions) {
      t._type='transaction'; t._teams=matchTeamsTransaction(t);
      t._sortDate=new Date(t.date); t._trade=t._category==='trade'; t._injury=t._category==='injury'; t._breaking=false;
      transactions.push(t);
    }
  }

  updateStats(); updateTicker(); updateTabCounts(); renderSidebar(); renderCards();
  btn.classList.remove('spinning');
  document.getElementById('stat-updated').textContent = new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
}

function allItems() {
  if (activeSourceTab==='news') return newsArticles;
  if (activeSourceTab==='social') return socialPosts;
  if (activeSourceTab==='transactions') return transactions;
  return [...newsArticles,...socialPosts,...transactions].sort((a,b)=>b._sortDate-a._sortDate);
}

function updateStats() {
  const all = [...newsArticles,...socialPosts,...transactions];
  document.getElementById('stat-total').textContent = all.length;
  document.getElementById('stat-breaking').textContent = all.filter(a=>a._breaking).length;
  document.getElementById('stat-trades').textContent = all.filter(a=>a._trade).length;
  document.getElementById('stat-injuries').textContent = all.filter(a=>a._injury).length;
  document.getElementById('count-all').textContent = all.length;
  document.getElementById('count-breaking').textContent = all.filter(a=>a._breaking).length;
  document.getElementById('count-trades').textContent = all.filter(a=>a._trade).length;
  document.getElementById('count-injuries').textContent = all.filter(a=>a._injury).length;
}

function updateTabCounts() {
  document.getElementById('tab-count-all').textContent = newsArticles.length+socialPosts.length+transactions.length;
  document.getElementById('tab-count-news').textContent = newsArticles.length;
  document.getElementById('tab-count-transactions').textContent = transactions.length;
  document.getElementById('tab-count-social').textContent = socialPosts.length;
}

function updateTicker() {
  const all = [...newsArticles,...socialPosts].sort((a,b)=>b._sortDate-a._sortDate);
  const priority = all.filter(a=>a._breaking||a._trade).slice(0,10);
  const src = priority.length ? priority : all.slice(0,8);
  const html = src.map(a=>`<span class="ticker-item">${a.title||a.text_preview}<span class="ticker-sep"> · </span></span>`).join('');
  document.getElementById('tickerTrack').innerHTML = html+html;
}

function renderSidebar() {
  const search = (document.getElementById('catSearch')?.value||'').toLowerCase();
  const all = allItems();
  const counts = {};
  for (const a of all) for (const tid of (a._teams||[])) counts[tid]=(counts[tid]||0)+1;
  const league = getLeague();
  let html = '';
  for (const div of league.divisions) {
    const teams = league.teams.filter(t=>t.division===div&&(!search||t.label.toLowerCase().includes(search)));
    if (!teams.length) continue;
    html += `<div class="cat-group-label">${div}</div>`;
    for (const t of teams) {
      const ac = activeCategory===t.id?'active':'';
      html += `<button class="filter-btn ${ac}" onclick="setCategory('${t.id}',this)"><span><span class="team-dot" style="background:${t.color}"></span>${t.label}</span><span class="filter-count">${counts[t.id]||'—'}</span></button>`;
    }
  }
  document.getElementById('sidebarCats').innerHTML = html;
}

  activeCategory = cat;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  if(el) el.classList.add('active');
  renderCards();
}

function setSourceTab(tab, el) {
  activeSourceTab = tab;
  document.querySelectorAll('.source-tab').forEach(b=>b.classList.remove('active'));
  if(el) el.classList.add('active');
  renderSidebar(); renderCards();
}

function renderCards() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const sort = document.getElementById('sortSelect').value;
  let items = allItems();
  if (activeCategory==='breaking') items=items.filter(a=>a._breaking);
  else if (activeCategory==='trades') items=items.filter(a=>a._trade);
  else if (activeCategory==='injuries') items=items.filter(a=>a._injury);
  else if (activeCategory!=='all') items=items.filter(a=>(a._teams||[]).includes(activeCategory));
  if (search) items=items.filter(a=>((a.title||a.text_preview||'')+' '+(a.description||'')).toLowerCase().includes(search));
  if (sort==='oldest') items=[...items].reverse();
  document.getElementById('resultCount').textContent=`${items.length} stories`;
  if (!items.length) {
    document.getElementById('cardsGrid').innerHTML='<div class="state-box"><span>No stories match this filter yet.</span></div>';
    return;
  }
  document.getElementById('cardsGrid').innerHTML = items.map((a,i)=>{
    const delay = Math.min(i*20,400);
    if (a._type==='transaction') return renderTransactionCard(a,delay);
    if (a._type==='social') return renderSocialCard(a,delay);
    return renderNewsCard(a,delay);
  }).join('');
}

function renderNewsCard(a, delay) {
  const sc = srcColor(a.source?.name);
  const sn = (a.source?.name||'Unknown').toUpperCase().slice(0,14);
  const type = a._breaking?'breaking':a._trade?'trade':a._injury?'injury':'';
  const teams = getTeams();
  const teamTags = teams.filter(t=>(a._teams||[]).includes(t.id)).slice(0,2).map(t=>`<span class="team-tag" style="border-left:2px solid ${t.color}">${t.label.split(' ').slice(-1)[0]}</span>`).join('');
  return `<div class="card ${type}" style="animation-delay:${delay}ms">
    ${a.urlToImage?`<img class="card-img" src="${a.urlToImage}" alt="" onerror="this.parentNode.removeChild(this)">` :''}
    <div class="card-body">
      <div class="card-meta">
        <span class="source-tag" style="background:${sc}22;color:${sc};border:1px solid ${sc}44">${sn}</span>
        ${type==='breaking'?'<span class="type-tag type-breaking">BREAKING</span>':''}
        ${type==='trade'?'<span class="type-tag type-trade">TRADE</span>':''}
        ${type==='injury'?'<span class="type-tag type-injury">INJURY</span>':''}
        ${teamTags}
      </div>
      <div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);margin-bottom:4px">${timeAgo(a.publishedAt)} &nbsp;·&nbsp; ${fmtDateTime(a.publishedAt)}</div>
      <div class="card-title">${a.title}</div>
      ${a.description?`<div class="card-excerpt">${a.description.slice(0,130)}…</div>`:''}
    </div>
    <div class="card-footer">
      <span class="card-author">${a.author?a.author.split(',')[0].slice(0,28):'Staff'}</span>
      <div style="display:flex;gap:6px">
        <button class="btn-read" onclick="window.open('${a.url}','_blank')">Read →</button>
        <button class="btn-assign" onclick="this.textContent='✓ Assigned';this.classList.add('assigned');this.disabled=true">Assign</button>
      </div>
    </div>
  </div>`;
}

function renderSocialCard(p, delay) {
  const type = p._breaking?'breaking':p._trade?'trade':p._injury?'injury':'';
  const teams = getTeams();
  const teamTags = teams.filter(t=>(p._teams||[]).includes(t.id)).slice(0,2).map(t=>`<span class="team-tag" style="border-left:2px solid ${t.color}">${t.label.split(' ').slice(-1)[0]}</span>`).join('');
  const streams = (p.matched_streams||[]).filter(s=>!['MLB','Breaking MLB'].includes(s)).slice(0,3);
  const followers = p.author?.followers_count ? `${(p.author.followers_count/1000).toFixed(0)}K followers` : '';
  const m = p.latest_metrics||{};
  return `<div class="card social ${type}" style="animation-delay:${delay}ms">
    <div class="social-header">
      <div class="social-avatar">${initials(p.author?.display_name||p.author?.username||'?')}</div>
      <div><div class="social-name">${p.author?.display_name||p.author?.username}</div><div class="social-handle">@${p.author?.username} · ${followers}</div></div>
      <div style="margin-left:auto;display:flex;flex-direction:column;align-items:flex-end;gap:4px">
        <span class="type-tag type-social">𝕏 POST</span>
        <span class="card-time" title="${fmtDateTime(p.created_at)}">${timeAgo(p.created_at)} · ${fmtDateTime(p.created_at)}</span>
      </div>
    </div>
    <div class="social-body">
      <div class="card-meta" style="margin-bottom:8px">
        ${type==='breaking'?'<span class="type-tag type-breaking">BREAKING</span>':''}
        ${type==='trade'?'<span class="type-tag type-trade">TRADE</span>':''}
        ${teamTags}
      </div>
      <div class="social-text">${(p.text_preview||'').replace(/https?:\/\/\S+/g,'').trim()}</div>
    </div>
    <div class="social-metrics">
      <div class="metric">❤️ <span>${m.likes||0}</span></div>
      <div class="metric">🔁 <span>${m.reposts||0}</span></div>
      <div class="metric">💬 <span>${m.replies||0}</span></div>
      <div class="metric">👁 <span>${m.views||0}</span></div>
    </div>
    <div class="social-footer">
      <div class="stream-tags">${streams.map(s=>`<span class="stream-tag">${s}</span>`).join('')}</div>
      <div style="display:flex;gap:6px">
        <button class="btn-read" onclick="window.open('${p.source_url}','_blank')">View on X →</button>
        <button class="btn-assign" onclick="this.textContent='✓ Assigned';this.classList.add('assigned');this.disabled=true">Assign</button>
      </div>
    </div>
  </div>`;
}

function renderTransactionCard(t, delay) {
  const typeEmoji = t._category==='trade'?'🔄':t._category==='injury'?'🏥':'📋';
  const teams = getTeams();
  const teamTags = teams.filter(tm=>(t._teams||[]).includes(tm.id)).slice(0,2).map(tm=>`<span class="team-tag" style="border-left:2px solid ${tm.color}">${tm.label.split(' ').slice(-1)[0]}</span>`).join('');
  const fromTo = t.fromTeam&&t.toTeam?`<span>${t.fromTeam}</span><span class="tx-arrow">→</span><span>${t.toTeam}</span>`:t.fromTeam?`<span>${t.fromTeam}</span>`:t.toTeam?`<span>${t.toTeam}</span>`:'';
  const dateObj = new Date(t.date);
  const date = dateObj.toLocaleDateString('en-US',{month:'short',day:'numeric'}) + (t.date.includes('T') ? ' · ' + dateObj.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'}) : '');
  const leagueLabel = activeLeague.toUpperCase();
  return `<div class="card transaction" style="animation-delay:${delay}ms">
    <div class="tx-body">
      <div class="card-meta">
        <span class="type-tag type-trade">${typeEmoji} ${t.transactionType||'Transaction'}</span>
        ${teamTags}
        <span class="card-time">${date}</span>
      </div>
      <div class="tx-player">${t.player||'Unknown'}</div>
      <div class="tx-desc">${t.description||''}</div>
      ${fromTo?`<div class="tx-teams">${fromTo}</div>`:''}
    </div>
    <div class="card-footer">
      <span style="color:#a78bfa;font-size:10px;font-family:'DM Mono',monospace">${leagueLabel} OFFICIAL</span>
      <button class="btn-assign" onclick="this.textContent='✓ Assigned';this.classList.add('assigned');this.disabled=true">Assign</button>
    </div>
  </div>`;
}

function updateClock(){document.getElementById('clock').textContent=new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit'});}
setInterval(updateClock,1000); updateClock();
// Background refresh all leagues every 5 minutes
const TX_ENDPOINTS = { mlb:'/api/transactions', nhl:'/api/nhl-transactions', nba:'/api/nba-transactions', nfl:'/api/nfl-transactions' };

async function refreshLeagueInBackground(league) {
  const lg = LEAGUES[league];
  try {
    const fetches = [
      Promise.allSettled(lg.queries.map(q => fetch(`/api/news?q=${encodeURIComponent(q)}&pageSize=20`).then(r => r.json())))
    ];
    if (lg.hasTransactions) fetches.push(fetch(TX_ENDPOINTS[league]).then(r => r.json()).catch(() => null));
    if (lg.hasSocial) fetches.push(fetch('/api/nocap').then(r => r.json()).catch(() => null));
    const results = await Promise.all(fetches);
    leagueCache[league] = { newsResults: results[0], txResult: lg.hasTransactions ? results[1] : null, nocapResult: lg.hasSocial ? results[lg.hasTransactions ? 2 : 1] : null, ts: Date.now() };
  } catch(e) { /* silent */ }
}

async function refreshAllLeagues() {
  const current = activeLeague;
  // Refresh all background leagues in parallel
  await Promise.all(['mlb','nfl','nba','nhl'].filter(l => l !== current).map(refreshLeagueInBackground));
  // Refresh active league visibly
  fetchAll();
}

setInterval(refreshAllLeagues, 5 * 60 * 1000);
window.addEventListener('load', fetchAll);
</script>
